services:
  usersservice:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5025:8080"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=eCommerceDb
      - DATABASE_USER=arvisiljins
      - DATABASE_PASSWORD=xxx111
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - users-network

networks:
  users-network:
    driver: bridge
